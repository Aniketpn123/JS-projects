<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      .container {
        background: linear-gradient(
          45deg,
          rgb(0, 128, 255),
          rgb(178, 176, 176)
        );
        width: 40%;
        height: 60%;
        margin: auto;
        text-align: center;
        padding: 10px;
      }
      p {
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        font-size: 32px;
      }
      button {
        padding: 10px;
        border-radius: 20px;
        font-size: 14px;
        margin: 0px 20px;
      }
    </style>
    <title>counter</title>
  </head>
  <body>
    <div class="container">
      <p class="counter">0</p>
      <button onclick="min()">-</button>
      <button onclick="reset()">reset</button>
      <button onclick="add()">+</button>
      <p class="result">this no is</p>
    </div>

    <script>
      let c = 0;
      let counter = document.querySelector(".counter");
      let result = document.querySelector(".result");
      get();
      function store(){
        localStorage.setItem('c',c);
        localStorage.setItem('result',result.innerHTML);
      }
      function get(){
        let counterValue=localStorage.getItem('c');
        let finalresult=localStorage.getItem('result');

        if( counterValue !== null){
          c= Number(counterValue);
           counter.innerHTML = `${c}`;
           color();
        }
        if(finalresult !== null){
          result.innerHTML = finalresult;
        }
      }
      function dispaly() {
        counter.innerHTML = `${c}`;
      }
      function color() {
        if (c < 0) {
          counter.style.color = "red";
        }
        if (c > 0) {
          counter.style.color = "green";
        }
        if (c == 0) {
          counter.style.color = "black";
        }
        if (c % 2 == 0) {
          result.innerHTML = `this no is 'even'`;
        }
        if (c % 2 !== 0) {
          result.innerHTML = `this no is 'odd'`;
        }
      }
      function min() {
        c--;
        dispaly();
        color();
        store();
      }

      function add() {
        c++;
        dispaly();
        color();
        store();
      }

      function reset() {
        c = 0;
        color();
        dispaly();
        store();
      }
    </script>
  </body>
</html>
