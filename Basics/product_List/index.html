<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      img {
        width: 200px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div>
      <nav>
        <input type="text" placeholder="search-product" />
        <button>search</button>
      </nav>

      <div>
        <div class="result"></div>
      </div>
    </div>

    <script>
      let result = document.querySelector(".result");

      let products = [
        {
          id: 1,
          name: "apple",
          quantity: 2,
          rating: 4.5,
          img: "",
        },
      ];
      async function getData() {
        try {
          const response = await fetch("https://dummyjson.com/products");
          const data = await response.json();
          console.log(data.products[0].title);
          console.log(typeof data.products[0].title);
          result.innerHTML = `<img src="${data.products[0].images[0]}" alt="img" />`;
          data.products.map((p) => {
            console.log(p.images[0]);
            result.innerHTML += `
      <div>
        <h3>${p.title}</h3>
        <img src="${p.thumbnail}" width="100"/>
        <p>₹${p.price}</p>
      </div>
    `;
          });
        } catch (error) {
          new Error(console.log("not working"));
        }
      }

      getData();
    </script>
  </body>
</html>
